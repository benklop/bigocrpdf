name: Build and Publish AppImage

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: appimage-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            python3 \
            python3-pip \
            python3-dev \
            wget \
            patchelf \
            desktop-file-utils \
            pkg-config \
            libcairo2-dev \
            gobject-introspection \
            libgirepository-2.0-dev

      - name: Build AppImage
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: |
          APP_VERSION_CLEAN="${APP_VERSION#v}"
          chmod +x ./build-appimage-advanced.sh
          APP_VERSION="$APP_VERSION_CLEAN" ./build-appimage-advanced.sh

      - name: Verify AppImage output
        run: |
          set -euo pipefail
          ls -lah dist || true
          shopt -s nullglob
          files=(dist/*.AppImage)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No AppImage produced in dist/."
            exit 1
          fi
          printf 'Found AppImage artifacts:\n'
          printf ' - %s\n' "${files[@]}"
          for file in "${files[@]}"; do
            test -f "$file"
          done

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigocrpdf-appimage-${{ github.ref_name }}
          path: dist/*.AppImage
          if-no-files-found: error

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.AppImage
          fail_on_unmatched_files: true
          generate_release_notes: true
